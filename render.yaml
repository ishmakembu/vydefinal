services:
  - type: web
    name: vyde
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: NEXT_PUBLIC_LIVEKIT_URL
        sync: false
      - key: NEXT_PUBLIC_PARTYKIT_HOST
        sync: false
      - key: NEXT_PUBLIC_TURN_URL
        sync: false
      - key: NEXT_PUBLIC_TURN_USER
        sync: false
      - key: NEXT_PUBLIC_TURN_PASS
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://vyde.onrender.com
